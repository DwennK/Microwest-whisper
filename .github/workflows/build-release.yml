name: Build and Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "22"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up Rust
        run: rustup toolchain install stable --profile minimal

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build:frontend

      - name: Check Tauri backend
        run: cargo check --manifest-path src-tauri/Cargo.toml

  build:
    name: Build ${{ matrix.name }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos
            os: macos-latest
            artifact: microwest-whisper-macos
            paths: |
              src-tauri/target/release/bundle/macos/*.app
              src-tauri/target/release/bundle/macos/*.app.tar.gz
              src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
              src-tauri/target/release/bundle/dmg/*.dmg
          - name: windows
            os: windows-latest
            artifact: microwest-whisper-windows
            paths: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/nsis/*.exe.sig
              src-tauri/target/release/bundle/nsis/*.zip
              src-tauri/target/release/bundle/nsis/*.zip.sig
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/msi/*.msi.sig
              src-tauri/target/release/bundle/msi/*.zip
              src-tauri/target/release/bundle/msi/*.zip.sig
          - name: linux
            os: ubuntu-latest
            artifact: microwest-whisper-linux
            paths: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/appimage/*.AppImage.sig
              src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz
              src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz.sig
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/rpm/*.rpm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Rust
        run: rustup toolchain install stable --profile minimal

      - name: Install frontend dependencies
        run: npm ci

      - name: Fetch native whisper.cpp binaries
        run: python scripts/fetch-whispercpp-binaries.py

      - name: Import Windows signing certificate
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if (-not $env:WINDOWS_CERTIFICATE_BASE64) {
            Write-Host "Windows signing certificate not configured; build will be unsigned."
            exit 0
          }
          [IO.File]::WriteAllBytes("windows-certificate.pfx", [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))
          $password = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText
          Import-PfxCertificate -FilePath windows-certificate.pfx -CertStoreLocation Cert:\CurrentUser\My -Password $password

      - name: Build Tauri app
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npm run build

      - name: Build Tauri app with updater artifacts
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ secrets.APPLE_API_KEY_PATH }}
          APPLE_PROVIDER_SHORT_NAME: ${{ secrets.APPLE_PROVIDER_SHORT_NAME }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
          WINDOWS_DIGEST_ALGORITHM: ${{ vars.WINDOWS_DIGEST_ALGORITHM }}
          WINDOWS_TIMESTAMP_URL: ${{ vars.WINDOWS_TIMESTAMP_URL }}
        run: npm run build:release

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.paths }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Generate updater manifest
        env:
          TAG_NAME: ${{ github.ref_name }}
          MACOS_UPDATER_TARGET: darwin-aarch64
        run: node scripts/generate-updater-manifest.mjs release-artifacts

      - name: Generate checksums
        shell: bash
        run: |
          find release-artifacts -type f \( \
            -name '*.dmg' -o \
            -name '*.exe' -o \
            -name '*.msi' -o \
            -name '*.AppImage' -o \
            -name '*.deb' -o \
            -name '*.rpm' -o \
            -name '*.tar.gz' -o \
            -name '*.sig' -o \
            -name 'latest.json' \
          \) -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            > release-artifacts/SHA256SUMS.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          checksum_notes="$(
            awk '{ printf "- `%s`  `%s`\n", $1, $2 }' release-artifacts/SHA256SUMS.txt
          )"
          release_notes="$(printf '## SHA-256 checksums\n\n%s\n\nThe full checksum file is also attached as `SHA256SUMS.txt`.' "$checksum_notes")"
          mapfile -d '' release_files < <(
            find release-artifacts -type f \( \
              -name '*.dmg' -o \
              -name '*.exe' -o \
              -name '*.msi' -o \
              -name '*.AppImage' -o \
              -name '*.deb' -o \
              -name '*.rpm' -o \
              -name '*.tar.gz' -o \
              -name '*.sig' -o \
              -name 'latest.json' -o \
              -name 'SHA256SUMS.txt' \
            \) -print0
          )
          if [ "${#release_files[@]}" -eq 0 ]; then
            echo "No release files found"
            exit 1
          fi
          gh release create "$TAG_NAME" "${release_files[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --generate-notes \
            --notes "$release_notes"
